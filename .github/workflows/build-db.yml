name: Build & Validate Database Migrations

on:
  workflow_call:
    inputs:
      migrations-directory:
        description: Directory containing SQL migration files
        type: string
        default: "migrations"
      mysql-version:
        description: MySQL version for validation
        type: string
        default: "8.0"

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:${{ inputs.mysql-version }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SQL syntax
        run: |
          for f in ${{ inputs.migrations-directory }}/*.sql; do
            echo "Validating $f"
            mysql -h 127.0.0.1 -u root -proot test < "$f"
          done
