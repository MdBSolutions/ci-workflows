name: Docker Build and Deploy

on:
  workflow_call:
    inputs:
      image-name:
        description: "Naam van het Docker image (zonder registry prefix)"
        required: true
        type: string
      deploy-tag:
        description: "Ansible tag voor de platform deploy (rol naam)"
        required: true
        type: string
      deploy-limit:
        description: "Ansible --limit voor de platform deploy (hostname)"
        required: true
        type: string

jobs:
  build-deploy:
    runs-on: [self-hosted, linux, backend1]
    steps:
      - name: Fix workspace permissions
        if: always()
        run: |
          RUID=$(id -u)
          RGID=$(id -g)
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            alpine \
            chown -R ${RUID}:${RGID} /workspace

      - uses: actions/checkout@v4

      - name: Bepaal registry adres
        run: |
          REGISTRY_IP=$(ip -4 addr show wg0 | grep inet | awk '{print $2}' | cut -d/ -f1)
          echo "REGISTRY=${REGISTRY_IP}:5000" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            -t $REGISTRY/${{ inputs.image-name }}:latest \
            -t $REGISTRY/${{ inputs.image-name }}:${{ github.sha }} \
            .

      - name: Push to local registry
        run: |
          docker push $REGISTRY/${{ inputs.image-name }}:latest
          docker push $REGISTRY/${{ inputs.image-name }}:${{ github.sha }}

      - name: Deploy via platform Ansible
        run: |
          docker run --rm \
            -v /etc/vault:/vault:ro \
            -v /opt/platform:/ansible \
            -e VAULT_ADDR=http://10.0.0.7:8200 \
            -e DEPLOY_TAGS="${{ inputs.deploy-tag }}" \
            -e DEPLOY_LIMIT="${{ inputs.deploy-limit }}" \
            $REGISTRY/platform-runner:latest
