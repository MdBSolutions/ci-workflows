name: Ansible Deploy

on:
  workflow_call:
    inputs:
      playbook:
        description: "Ansible playbook bestand"
        required: false
        type: string
        default: "deploy.yml"
      runner:
        description: "Runner als JSON array"
        required: false
        type: string
        default: '["self-hosted","linux","backend1"]'
      vault-addr:
        description: "Vault adres"
        required: false
        type: string
        default: "http://10.0.0.7:8200"
      tags:
        description: "Ansible tags om te beperken welke roles draaien (kommagescheiden)"
        required: false
        type: string
        default: ""

jobs:
  deploy:
    runs-on: ${{ fromJson(inputs.runner) }}
    env:
      VAULT_ADDR: ${{ inputs.vault-addr }}
    steps:
      - name: Fix workspace permissions
        if: always()
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/ansible \
            alpine chown -R $(id -u):$(id -g) /ansible

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verkrijg Vault token
        run: |
          SECRET_ID=$(cat /vault/secret_id)
          TOKEN=$(curl -sf --max-time 10 \
            -X POST "$VAULT_ADDR/v1/auth/approle/login" \
            -H "Content-Type: application/json" \
            -d "{\"role_id\":\"$VAULT_ROLE_ID\",\"secret_id\":\"$SECRET_ID\"}" \
            | jq -r '.auth.client_token')
          echo "::add-mask::$TOKEN"
          echo "VAULT_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Installeer Ansible collections
        run: ansible-galaxy collection install "community.docker:>=3.0.0,<4.0.0" community.hashi_vault

      - name: Run Ansible playbook
        run: |
          TAGS_ARG=""
          if [ -n "${{ inputs.tags }}" ]; then
            TAGS_ARG="--tags ${{ inputs.tags }}"
          fi
          ansible-playbook ${{ inputs.playbook }} $TAGS_ARG
        working-directory: ${{ github.workspace }}
