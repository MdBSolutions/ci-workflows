name: PHP Pipeline

on:
  workflow_call:
    inputs:
      service-name:
        description: "Naam van de service"
        required: true
        type: string
      port:
        description: "Poort waarop de service luistert"
        required: true
        type: string
      with-db:
        description: "Service heeft een database"
        required: false
        type: boolean
        default: false
      skip-startup:
        description: "Sla startup stap over (voor services die zichzelf beheren, bijv. vault_manager)"
        required: false
        type: boolean
        default: false
      php-version:
        required: false
        type: string
        default: "8.3"
      runner:
        required: false
        type: string
        default: '["self-hosted","linux","backend1"]'

jobs:
  test:
    uses: MdBSolutions/ci-workflows/.github/workflows/test-php.yml@main
    with:
      php-version: ${{ inputs.php-version }}

  build:
    needs: test
    uses: MdBSolutions/ci-workflows/.github/workflows/build.yml@main
    with:
      service-name: ${{ inputs.service-name }}
      runner: ${{ inputs.runner }}

  startup:
    needs: build
    if: github.ref == 'refs/heads/main' && !inputs.skip-startup
    uses: MdBSolutions/ci-workflows/.github/workflows/startup-php.yml@main
    with:
      service-name: ${{ inputs.service-name }}
      port: ${{ inputs.port }}
      with-db: ${{ inputs.with-db }}
      runner: ${{ inputs.runner }}
