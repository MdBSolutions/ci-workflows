name: Docker Build & Push

on:
  workflow_call:
    inputs:
      image-name:
        description: Docker image name (without registry prefix)
        type: string
        required: true
      tag:
        description: Docker image tag
        type: string
        default: ${{ github.sha }}
      dockerfile:
        description: Path to Dockerfile
        type: string
        default: Dockerfile
      context:
        description: Docker build context
        type: string
        default: "."
      push:
        description: Whether to push the image
        type: boolean
        default: true
      platforms:
        description: Target platforms (comma-separated)
        type: string
        default: "linux/amd64"
    secrets:
      REGISTRY_URL:
        required: true
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true
    outputs:
      image-digest:
        description: Docker image digest
        value: ${{ jobs.build.outputs.digest }}
      image-tag:
        description: Full image tag including registry
        value: ${{ jobs.build.outputs.tag }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tag: ${{ secrets.REGISTRY_URL }}/${{ inputs.image-name }}:${{ inputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ secrets.REGISTRY_URL }}/${{ inputs.image-name }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
